name: Sync Tivoli Routes

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-tivoli-routes
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run Tivoli route sync
        run: node scripts/sync-tivoli-routes.mjs | tee sync-output.log

      - name: Show git status
        run: git status --short

      - name: Commit and push changes
        run: |
          if git diff --quiet --exit-code; then
            echo "No route changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md scripts/sync-tivoli-routes.mjs tivoli-routes-data.js data/latest-route-sync.json data/latest-route-sync.js data/snapshots/tivoli-routes-*.csv
          git commit -m "Sync Tivoli routes"
          git push

      - name: Publish summary
        if: always()
        run: |
          {
            echo "## Tivoli route sync"
            echo
            echo '```text'
            cat sync-output.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
